<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Soroban Mental</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Barra de controles (fullscreen, tema, configurações, histórico) -->
    <div class="controls">
        <button class="ctrl-btn" id="btn-fullscreen" title="Tela Cheia">
            <i class="bi bi-arrows-fullscreen" id="fullscreen-icon"></i>
        </button>
        <div class="ctrl-sep"></div>
        <button class="ctrl-btn" id="btn-theme-toggle" title="Alternar Tema">
            <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
        </button>
        <button class="ctrl-btn" data-bs-toggle="modal" data-bs-target="#settingsModal" title="Configurações">
            <i class="bi bi-sliders"></i>
        </button>
        <button class="ctrl-btn" data-bs-toggle="offcanvas" data-bs-target="#historyCanvas" title="Histórico">
            <i class="bi bi-clock-history"></i>
        </button>
    </div>

    <!-- Tabuleiro principal -->
    <div id="game-board">
        <div id="feedback-msg"></div>

        <button id="btn-start-center">
            <div class="start-lbl">
                <span id="start-text">Iniciar</span>
            </div>
            <span class="start-hint">pressione espaço</span>
        </button>

        <div id="number-display"></div>

        <div id="answer-area">
            <input type="text" inputmode="numeric" id="center-input" placeholder="?">
            <div id="action-buttons">
                <button id="btn-try-again" class="act-btn">
                    <i class="bi bi-arrow-counterclockwise"></i> Tentar novamente
                </button>
                <button id="btn-show-answer" class="act-btn">
                    <i class="bi bi-eye"></i> Ver resposta
                </button>
            </div>
        </div>

        <div id="pause-indicator">
            <span class="pause-icon"><i class="bi bi-pause-fill"></i></span>
            <span class="pause-label">Pausado · espaço para continuar</span>
        </div>
    </div>

    <!-- Modal de configurações -->
    <div class="modal fade" id="settingsModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 960px;">
            <div class="modal-content">
                <div class="modal-header">
                    <span class="modal-title">Configurações</span>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="modal-body-grid">

                        <!-- Painel de configurações -->
                        <div>
                            <div class="s-block">
                                <div class="s-lbl">Escala da interface</div>
                                <select id="cfg-ui-scale" class="form-control s-select">
                                    <option value="1">100% — padrão</option>
                                    <option value="1.15">115%</option>
                                    <option value="1.3">130%</option>
                                    <option value="1.5">150%</option>
                                    <option value="1.75">175%</option>
                                    <option value="2">200%</option>
                                </select>
                            </div>

                            <div class="s-block">
                                <div class="s-lbl">Tamanho dos números</div>
                                <select id="cfg-font-size" class="form-control cfg-input s-select">
                                    <option value="60">60 px</option>
                                    <option value="80">80 px</option>
                                    <option value="96">96 px</option>
                                    <option value="112">112 px</option>
                                    <option value="128" selected>128 px</option>
                                    <option value="144">144 px</option>
                                    <option value="160">160 px</option>
                                    <option value="180">180 px</option>
                                    <option value="200">200 px</option>
                                    <option value="224">224 px</option>
                                </select>
                            </div>

                            <div class="s-grid s-block">
                                <div>
                                    <div class="s-lbl">Dígitos</div>
                                    <input type="text" inputmode="numeric" id="cfg-digits" class="form-control cfg-input" value="1">
                                </div>
                                <div>
                                    <div class="s-lbl">Linhas</div>
                                    <input type="text" inputmode="numeric" id="cfg-rows" class="form-control cfg-input" value="5">
                                </div>
                                <div>
                                    <div class="s-lbl">Tempo na tela</div>
                                    <div class="s-time-row">
                                        <input type="text" inputmode="numeric" id="cfg-flash" class="form-control cfg-input" value="700">
                                        <select id="cfg-flash-unit" class="form-control cfg-input s-select s-unit">
                                            <option value="ms">ms</option>
                                            <option value="s">s</option>
                                            <option value="min">min</option>
                                        </select>
                                    </div>
                                </div>
                                <div>
                                    <div class="s-lbl">Intervalo escuro (ms)</div>
                                    <input type="text" inputmode="numeric" id="cfg-interval" class="form-control cfg-input" value="300">
                                </div>
                            </div>

                            <div class="s-switch">
                                <span>Permitir subtrações</span>
                                <div class="form-check form-switch mb-0">
                                    <input class="form-check-input cfg-input" type="checkbox" id="cfg-subtractions" role="switch">
                                </div>
                            </div>
                        </div>

                        <!-- Painel de prévia -->
                        <div class="s-preview-panel">
                            <div class="s-lbl">Prévia</div>
                            <div class="s-preview-box">
                                <span id="font-preview">123</span>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Offcanvas de histórico -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="historyCanvas">
        <div class="offcanvas-header">
            <span class="offcanvas-title">Histórico</span>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body" id="history-list">
            <p id="empty-history">Nenhum cálculo feito ainda.</p>
        </div>
    </div>

    <!-- Scripts: ordem importa (state → ui → storage → game → events) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/game.js"></script>
    <script src="js/events.js"></script>
</body>
</html>
